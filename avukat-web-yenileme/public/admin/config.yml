backend:
  name: github
  repo: ayktyk/avukat-web-yenileme
  branch: main
  base_url: https://vegahukukistanbul.com
  auth_endpoint: api/cms/auth

site_url: https://vegahukukistanbul.com
site_domain: vegahukukistanbul.com
logo_url: /og-image.svg
locale: tr
publish_mode: simple
media_folder: public/uploads/blog
public_folder: /uploads/blog

collections:
  - name: blog
    label: Blog Yazıları
    label_singular: Blog Yazısı
    folder: src/content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} - {{publishedAt}}"
    sortable_fields: [publishedAt, updatedAt, title]
    editor:
      preview: false
    fields:
      - { label: Başlık, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "Örnek: ise-iade-arabuluculukta-kritik-noktalar" }
      - { label: Özet, name: excerpt, widget: text }
      - { label: Kategori, name: category, widget: string, default: Genel }
      - { label: Yazar, name: author, widget: string, default: Vega Hukuk }
      - { label: Yayın Tarihi, name: publishedAt, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: Güncelleme Tarihi, name: updatedAt, widget: datetime, required: false, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: SEO Başlığı, name: seoTitle, widget: string, required: false }
      - { label: SEO Açıklaması, name: seoDescription, widget: text, required: false }
      - { label: Kapak Görseli, name: coverImage, widget: image, required: false }
      - { label: Kapak Gradient Sınıfı, name: coverClass, widget: string, required: false, hint: "Boş bırakırsan varsayılan görünüm kullanılır." }
      - { label: İçerik, name: body, widget: markdown }

  - name: legal_updates
    label: Hukuk Gündemi
    label_singular: Gündem İçeriği
    folder: src/content/legal-updates
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} - {{publishedAt}}"
    sortable_fields: [publishedAt, updatedAt, title]
    editor:
      preview: false
    fields:
      - { label: Başlık, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "Örnek: yargitay-fazla-mesai-karari-2026" }
      - { label: Özet, name: excerpt, widget: text }
      - { label: Tür, name: category, widget: string, default: Hukuk Gündemi, hint: "Örnek: Önemli Karar, Hukuk Gündemi, Pratik Not" }
      - { label: Yayın Tarihi, name: publishedAt, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: Güncelleme Tarihi, name: updatedAt, widget: datetime, required: false, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: SEO Başlığı, name: seoTitle, widget: string, required: false }
      - { label: SEO Açıklaması, name: seoDescription, widget: text, required: false }
      - { label: Kapak Görseli, name: coverImage, widget: image, required: false }
      - { label: Kapak Gradient Sınıfı, name: coverClass, widget: string, required: false }
      - { label: İçerik, name: body, widget: markdown }
